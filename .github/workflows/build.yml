name: Auto Compile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libglfw3-dev libglew-dev libgl1-mesa-dev libopenal-dev
    
    - name: Create build directory
      run: mkdir -p build
    
    - name: Configure CMake
      run: cd build && cmake ..
    
    - name: Build
      run: cd build && make
